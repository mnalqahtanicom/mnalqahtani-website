name: Deploy Talemia Prototype to Pages

# Publishes the self-contained MVP prototype (public/talemia-platform)
# to GitHub Pages so it can be reviewed at a shareable URL.

on:
  push:
    branches: [claude/great-tesla-WWzFP]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload prototype as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/talemia-platform
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
